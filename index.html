<style>
  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2130;
    --border: #2a2f45;
    --gold: #c9a84c;
    --gold2: #e8c96a;
    --text: #e8eaf0;
    --muted: #7a8099;
    --green: #4caf82;
    --yellow: #e8c041;
    --red: #e05c5c;
    --blue: #5b8dee;
    --tag-bg: #1e2336;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  .header { background: linear-gradient(135deg, #0d0f14 0%, #161921 100%); border-bottom: 1px solid var(--border); padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
  .header-left h1 span { color: var(--gold); }
  .header-left p { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .header-stats { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { text-align: center; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* DATE TABS */
  .date-tabs { padding: 16px 32px 0; display: flex; gap: 8px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .date-tab { padding: 8px 16px; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; color: var(--muted); border: 1px solid transparent; border-bottom: none; white-space: nowrap; transition: all 0.15s; }
  .date-tab:hover { color: var(--text); background: var(--surface2); }
  .date-tab.active { color: var(--gold); background: var(--surface); border-color: var(--border); border-bottom-color: var(--surface); }

  /* FILTERS */
  .filters { padding: 16px 32px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .filter-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-right: 4px; }
  .filter-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--tag-bg); color: var(--muted); cursor: pointer; font-size: 12px; transition: all 0.15s; white-space: nowrap; }
  .filter-btn:hover { border-color: var(--gold); color: var(--text); }
  .filter-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 600; }
  .filter-sep { width: 1px; height: 24px; background: var(--border); }
  .filter-sort { padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border); background: var(--tag-bg); color: var(--text); font-size: 12px; cursor: pointer; }
  .filter-sort option { background: var(--surface2); }

  /* SUMMARY BAR */
  .summary-bar { margin: 20px 32px 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .summary-bar strong { color: var(--text); }

  /* SECTION */
  .section { padding: 24px 32px 0; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .section-title { font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .source-badge { padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  .badge-chrono24 { background: #1a3a5c; color: #5b8dee; }
  .badge-ebay { background: #1a2e1a; color: #4caf82; }
  .section-count { color: var(--muted); font-size: 13px; }

  /* CARDS GRID */
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 16px; }

  /* WATCH CARD */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform 0.15s, border-color 0.15s; cursor: default; display: flex; flex-direction: column; }
  .card:hover { transform: translateY(-2px); border-color: var(--gold); }
  .card.honorable { opacity: 0.85; }
  .card.honorable:hover { opacity: 1; }
  .card-top { padding: 14px 16px 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-brand { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); font-weight: 700; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.35; margin-top: 2px; }
  .card-ref { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .deal-badge { flex-shrink: 0; padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 700; text-align: center; white-space: nowrap; }
  .deal-hot { background: rgba(76,175,82,0.15); color: var(--green); border: 1px solid rgba(76,175,82,0.3); }
  .deal-good { background: rgba(232,192,65,0.12); color: var(--yellow); border: 1px solid rgba(232,192,65,0.3); }
  .deal-fair { background: rgba(91,141,238,0.12); color: var(--blue); border: 1px solid rgba(91,141,238,0.3); }
  .deal-market { background: rgba(122,128,153,0.1); color: var(--muted); border: 1px solid var(--border); }

  .card-body { padding: 12px 16px; flex: 1; }
  .card-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; font-size: 12px; }
  .card-row-label { color: var(--muted); }
  .card-row-value { color: var(--text); font-weight: 500; text-align: right; }
  .price-main { font-size: 18px; font-weight: 700; color: var(--text); }
  .price-sub { font-size: 11px; color: var(--muted); margin-left: 4px; }
  .market-val { color: var(--muted); font-size: 12px; text-decoration: line-through; }
  .stars { color: var(--gold); letter-spacing: 1px; }
  .stars-empty { color: var(--border); }
  .tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-right: 4px; }
  .tag-cert { background: rgba(76,175,82,0.15); color: var(--green); }
  .tag-nocert { background: rgba(230,92,92,0.1); color: #e08080; }
  .tag-bp { background: rgba(76,175,82,0.15); color: var(--green); }
  .risk { font-size: 11px; color: #e08080; margin-top: 6px; padding: 6px 10px; background: rgba(224,92,92,0.07); border-radius: 5px; border-left: 2px solid #e05c5c; }

  .card-footer { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .seller-info { font-size: 11px; color: var(--muted); }
  .seller-info span { color: var(--text); }
  .btn-link { padding: 6px 14px; background: var(--gold); color: #000; border-radius: 6px; font-size: 12px; font-weight: 700; text-decoration: none; white-space: nowrap; transition: background 0.15s; border: none; cursor: pointer; }
  .btn-link:hover { background: var(--gold2); }

  /* HONORABLE TABLE */
  .hon-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .hon-table th { text-align: left; padding: 8px 12px; color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
  .hon-table td { padding: 10px 12px; border-bottom: 1px solid rgba(42,47,69,0.5); vertical-align: middle; }
  .hon-table tr:hover td { background: var(--surface2); }
  .hon-table tr:last-child td { border-bottom: none; }
  .hon-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-top: 0; }

  .divider { margin: 32px 32px 0; border: none; border-top: 1px solid var(--border); }
  .pb32 { padding-bottom: 32px; }

  .no-results { text-align: center; padding: 40px; color: var(--muted); font-size: 14px; }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .header, .filters, .section, .date-tabs, .summary-bar { padding-left: 16px; padding-right: 16px; }
    .summary-bar { margin: 16px 16px 0; }
    .divider { margin-left: 16px; margin-right: 16px; }
    .cards { grid-template-columns: 1fr; }
  }
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentDate = Object.keys(REPORTS).sort().reverse()[0];
let filters = { source: 'all', deal: 'all', brand: 'all' };
let sortBy = 'deal';

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function dealClass(d) {
  if (d === null || d === undefined) return 'deal-market';
  if (d <= -20) return 'deal-hot';
  if (d <= -10) return 'deal-good';
  if (d < 0) return 'deal-fair';
  return 'deal-market';
}
function dealLabel(d) {
  if (d === null || d === undefined || d === 0) return 'At market';
  return d + '%';
}
function stars(n) {
  if (!n) return '';
  let s = '';
  for (let i=0;i<5;i++) s += i < n ? '★' : '☆';
  return `<span class="stars">${'★'.repeat(n)}</span><span class="stars-empty">${'☆'.repeat(5-n)}</span>`;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function getBrands(report) {
  return [...new Set(report.picks.map(p => p.brand))].sort();
}

function renderDateTabs() {
  const dates = Object.keys(REPORTS).sort().reverse();
  document.getElementById('dateTabs').innerHTML = dates.map(d =>
    `<div class="date-tab ${d===currentDate?'active':''}" onclick="switchDate('${d}')">${d}</div>`
  ).join('');
}

function renderBrandFilters(report) {
  const brands = getBrands(report);
  document.getElementById('brandFilters').innerHTML =
    `<button class="filter-btn ${filters.brand==='all'?'active':''}" onclick="setFilter('brand','all',this)">All</button>` +
    brands.map(b =>
      `<button class="filter-btn ${filters.brand===b?'active':''}" onclick="setFilter('brand','${b}',this)">${b}</button>`
    ).join('');
}

function renderCard(p) {
  const dc = dealClass(p.deal);
  return `
  <div class="card ${p.tier==='honorable'?'honorable':''}">
    <div class="card-top">
      <div>
        <div class="card-brand">${p.brand}</div>
        <div class="card-title">${p.model}</div>
        <div class="card-ref">Ref. ${p.ref} · ${p.year} · ${p.size}</div>
      </div>
      <div class="deal-badge ${dc}">${dealLabel(p.deal)}</div>
    </div>
    <div class="card-body">
      <div class="card-row">
        <span class="card-row-label">Asking price</span>
        <span class="card-row-value"><span class="price-main">${p.price}</span><span class="price-sub">${p.priceEur}</span></span>
      </div>
      ${p.marketVal ? `<div class="card-row"><span class="card-row-label">Est. market value</span><span class="card-row-value">${p.marketVal}</span></div>` : ''}
      ${p.stars ? `<div class="card-row"><span class="card-row-label">Resale outlook</span><span class="card-row-value">${stars(p.stars)}</span></div>` : ''}
      <div class="card-row">
        <span class="card-row-label">Box &amp; Papers</span>
        <span class="card-row-value"><span class="tag tag-bp">${p.bp ? '✓ Full Set' : '✗ No B&P'}</span></span>
      </div>
      <div class="card-row">
        <span class="card-row-label">Certification</span>
        <span class="card-row-value"><span class="tag ${p.cert?'tag-cert':'tag-nocert'}">${p.cert ? '✓ Certified' : 'Private seller'}</span></span>
      </div>
      ${p.outlook ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;line-height:1.5;">${p.outlook}</div>` : ''}
      ${p.risk ? `<div class="risk">⚠ ${p.risk}</div>` : ''}
    </div>
    <div class="card-footer">
      <div class="seller-info">📍 <span>${p.seller}</span> · <span class="source-badge ${sourceBadgeClass(p.source)}" style="font-size:10px;padding:2px 7px;vertical-align:middle">${sourceLabel(p.source)}</span></div>
      <a class="btn-link" href="${p.url}" target="_blank">View →</a>
    </div>
  </div>`;
}

function sourceBadgeClass(s) {
  return s === 'ebay' ? 'badge-ebay' : 'badge-chrono24';
}
function sourceLabel(s) {
  return s === 'ebay' ? 'eBay UK' : 'Chrono24';
}
function renderHonorableRow(p) {
  const srcBadge = `<span class="source-badge ${sourceBadgeClass(p.source)}" style="font-size:10px;padding:2px 7px">${sourceLabel(p.source)}</span>`;
  return `
  <tr>
    <td><strong>${p.brand}</strong></td>
    <td>${p.model}</td>
    <td>${p.price}<br><span style="color:var(--muted);font-size:11px">${p.priceEur}</span></td>
    <td><span class="deal-badge ${dealClass(p.deal)}" style="font-size:11px;padding:2px 7px">${dealLabel(p.deal)}</span></td>
    <td>${srcBadge}</td>
    <td>${p.seller}</td>
    <td><a class="btn-link" href="${p.url}" target="_blank" style="padding:4px 10px;font-size:11px">View →</a></td>
  </tr>`;
}

function applyFiltersAndSort(picks) {
  let list = picks.filter(p => {
    if (filters.source !== 'all' && p.source !== filters.source) return false;
    if (filters.brand !== 'all' && p.brand !== filters.brand) return false;
    if (filters.deal !== 'all' && p.tier === 'top') {
      const minDeal = parseInt(filters.deal);
      if (p.deal === null || p.deal >= -minDeal) return false;
    }
    return true;
  });
  if (sortBy === 'deal') list.sort((a,b) => (a.deal ?? 0) - (b.deal ?? 0));
  else if (sortBy === 'stars') list.sort((a,b) => (b.stars ?? 0) - (a.stars ?? 0));
  else if (sortBy === 'price_asc') list.sort((a,b) => extractNum(a.price) - extractNum(b.price));
  else if (sortBy === 'price_desc') list.sort((a,b) => extractNum(b.price) - extractNum(a.price));
  return list;
}

function extractNum(s) {
  const n = s.replace(/[^0-9.]/g,'');
  return parseFloat(n) || 0;
}

function render() {
  const report = REPORTS[currentDate];
  renderBrandFilters(report);

  const allFiltered = applyFiltersAndSort(report.picks);
  const topFiltered = allFiltered.filter(p => p.tier === 'top');
  const honFiltered = allFiltered.filter(p => p.tier === 'honorable');

  // Stats
  const bestDeal = Math.min(...report.picks.filter(p=>p.deal<0).map(p=>p.deal));
  const uniqueBrands = new Set(report.picks.map(p=>p.brand)).size;
  document.getElementById('stat-total').textContent = report.picks.length;
  document.getElementById('stat-best').textContent = bestDeal + '%';
  document.getElementById('stat-brands').textContent = uniqueBrands;
  document.getElementById('stat-date').textContent = currentDate;

  let html = '';

  // Summary
  html += `<div class="summary-bar"><strong>📊 Market Summary:</strong> ${report.summary}</div>`;

  // All Top Picks together
  html += `<div class="section">
    <div class="section-header">
      <div class="section-title">Top Picks</div>
      <span class="section-count">${topFiltered.length} listings</span>
    </div>
    ${topFiltered.length ? `<div class="cards">${topFiltered.map(renderCard).join('')}</div>` : '<div class="no-results">No listings match current filters.</div>'}
  </div>`;

  // All Honorable Mentions together
  if (honFiltered.length) {
    html += `<hr class="divider"><div class="section">
      <div class="section-header">
        <div class="section-title">Honorable Mentions</div>
        <span class="section-count">${honFiltered.length} listings</span>
      </div>
      <div class="hon-wrap">
        <table class="hon-table">
          <thead><tr><th>Brand</th><th>Model</th><th>Price</th><th>Deal</th><th>Source</th><th>Seller</th><th></th></tr></thead>
          <tbody>${honFiltered.map(renderHonorableRow).join('')}</tbody>
        </table>
      </div>
    </div>`;
  }

  html += `<div class="pb32"></div>`;
  document.getElementById('app').innerHTML = html;
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
function setFilter(type, value, btn) {
  filters[type] = value;
  // toggle active on sibling buttons in same group
  const group = btn.parentElement;
  group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function sortCards(val) { sortBy = val; render(); }
function switchDate(d) { currentDate = d; render(); renderDateTabs(); }

// ─── INIT ────────────────────────────────────────────────────────────────────
renderDateTabs();
render();
</script>
